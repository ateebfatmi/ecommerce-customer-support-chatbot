<!DOCTYPE html>
<html>

<head>

    <title>E-commerce Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="chat-container">

    <h1>Customer Support Chatbot</h1>

    <form method="POST">

        <input type="text"
               name="message"
               placeholder="Type your message here..."
               required>

        <button type="submit">
            Send
        </button>

    </form>

    {% if user_message %}

    <div class="user-box">

        <h3>You</h3>

        <p>{{ user_message }}</p>

    </div>

    {% endif %}

    {% if bot_response %}

    <div class="bot-box">

        <h3>Bot</h3>

        <p>{{ bot_response }}</p>

    </div>

    {% endif %}

</div>

</body>
</html>
